# ----------------------------------------------------------
# Data Engineering Settings
# ----------------------------------------------------------
data:
  output_dir: data
  financials_dir: data/financials
  supply_chain_dir: data/supply_chain
  macro_dir: data/macro
  years: [2019, 2020, 2021, 2022, 2023]
  cache_ttl_hours: 24

  # FRED series for macro data
  fred_series:
    fed_funds_rate: "FEDFUNDS"
    cpi: "CPIAUCSL"
    industrial_production: "INDPRO"
    credit_spread_hy: "BAMLH0A0HYM2"

  # SEC EDGAR EDGAR API base
  sec_base_url: "https://data.sec.gov"
  sec_user_agent: "FinancialRiskPlatform research@example.com"

# ----------------------------------------------------------
# Financial Ratio Thresholds
# ----------------------------------------------------------
ratios:
  # Altman Z-Score coefficients (Altman 1968, public-firm version)
  z_score:
    w1: 1.2   # Working Capital / Total Assets
    w2: 1.4   # Retained Earnings / Total Assets
    w3: 3.3   # EBIT / Total Assets
    w4: 0.6   # Market Cap / Total Liabilities
    w5: 1.0   # Revenue / Total Assets

  # Credit zone boundaries (Altman 1968)
  credit_zones:
    safe_threshold: 2.99      # Z > 2.99 → Safe (green)
    grey_threshold: 1.81      # 1.81 < Z ≤ 2.99 → Grey (yellow)
    # Z ≤ 1.81 → Distress (red)

  liquidity:
    current_ratio_stress: 1.0   # Below this → liquidity stress multiplier applies

# ----------------------------------------------------------
# Propagation Engine Parameters
# ----------------------------------------------------------
propagation:
  # Stress attenuation per hop (economically: diversification buffers)
  contagion_damping_alpha: 0.6

  # Chokepoint detection
  chokepoint_outdegree_threshold: 3   # Nodes with out-degree >= this are chokepoints
  chokepoint_amplification_factor: 1.4

  # Liquidity cascade multiplier
  liquidity_stress_multiplier: 1.3

  # Minimum edge weight to propagate stress (noise floor)
  min_propagation_weight: 0.05

  # S1: fraction of additional interest expense that reduces EBIT
  s1_ebit_passthrough: 0.5

  # S2: operating leverage multiplier (EBIT falls faster than revenue)
  s2_operating_leverage: 1.5

  # Upstream operating leverage for supplier revenue cascade
  upstream_operating_leverage: 1.3

  # Stress-to-Z-score scaling factor (stress_score × z × this = Z delta)
  stress_to_z_scaling: 0.15

  # Stress thresholds for propagation decisions
  min_stress_propagate: 0.01     # minimum stress to continue BFS
  min_stress_accumulate: 0.001   # minimum stress to accumulate on buyer
  min_stress_z_update: 0.1       # minimum accumulated stress to update Z-score

  # Maximum BFS hops
  max_propagation_hops: 5

  # Z-score floor (minimum Z-score after shock)
  z_score_floor: -10.0

# ----------------------------------------------------------
# Shock Scenarios
# ----------------------------------------------------------
shocks:
  S1:
    name: "Interest Rate Spike"
    description: >
      Models a 2022-style rapid rate-hike cycle (Fed Funds from 0.25% to 5%+).
      Increases all firms' interest expense, reducing ICR and Z-scores.
      Most damaging for highly-leveraged firms with floating-rate debt.
    parameter: "interest_expense_increase_pct"
    default_magnitude: 0.40    # 40% increase in interest expense
    magnitude_min: 0.05
    magnitude_max: 2.0

  S2:
    name: "Demand Shock"
    description: >
      Models a demand collapse at OEM level (e.g., COVID-19 plant shutdowns,
      chip shortage production cuts). Reduces revenue of Tier-1 buyers,
      which cascades upstream as reduced orders to suppliers.
    parameter: "revenue_reduction_pct"
    default_magnitude: 0.25    # 25% revenue reduction
    magnitude_min: 0.05
    magnitude_max: 0.80

  S3:
    name: "Key Supplier Failure"
    description: >
      Models sudden distress of a single focal supplier (e.g., bankruptcy,
      fire, geopolitical shutdown). Z-score is set to distress floor and
      stress propagates downstream to buyers.
    parameter: "focal_firm"
    default_magnitude: 1.0    # Severity scalar (1.0 = full distress)
    magnitude_min: 0.1
    magnitude_max: 1.0

# ----------------------------------------------------------
# Dashboard Settings
# ----------------------------------------------------------
dashboard:
  title: "Financial Supply Chain Risk Platform"
  default_year: 2023
  node_size_min: 10
  node_size_max: 40
  colors:
    safe: "#2ecc71"       # green
    grey: "#f39c12"       # yellow/amber
    distress: "#e74c3c"   # red
    unknown: "#95a5a6"    # gray
  edge_weight_scale: 5    # multiply edge weight for visual thickness

# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------
logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
