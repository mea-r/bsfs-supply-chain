      name: "Toyota Motor Corporation"
      cik: "0000096831"
    - ticker: F
      name: "Ford Motor Company"
      cik: "0000037996"
    - ticker: GM
      name: "General Motors"
      cik: "0001467858"
    - ticker: STLA
      name: "Stellantis"
      cik: "0001800227"

  tier2_suppliers:
    - ticker: MGA
      name: "Magna International"
      cik: "0000749485"
    - ticker: APTV
      name: "Aptiv"
      cik: "0001521332"
    - ticker: BWA
