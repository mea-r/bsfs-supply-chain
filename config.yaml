# ============================================================
# Financial Supply Chain Risk Platform — Central Configuration
# ============================================================
# All business-logic parameters live here.
# Edit this file to change sector scope, thresholds, or API settings.

# ----------------------------------------------------------
# Sector & Firm Universe
# ----------------------------------------------------------
