# ============================================================
# CI Pipeline — Financial Supply Chain Risk Platform
# ============================================================
# Jobs:
#   lint   — ruff linting (non-blocking, warns only)
#   test   — install deps via uv, run `make test` if Makefile
#            exists, otherwise fall back to pytest directly
# Triggers:
#   - push to main
#   - pull requests targeting main
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

# ── Shared setup ────────────────────────────────────────────
# Each job re-uses the same setup steps via job-level defaults.
# uv is installed once via astral-sh/setup-uv and the venv is
# cached by uv automatically (UV_CACHE_DIR).

jobs:

  # ── 1. Lint ───────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true          # non-blocking — warns, doesn't fail CI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: uv tool install ruff

      - name: Run ruff (lint)
        run: uv tool run ruff check . --output-format=github

      - name: Run ruff (format check)
        run: uv tool run ruff format --check .

  # ── 2. Test ───────────────────────────────────────────────
  test:
    name: Test (Python 3.13)
    runs-on: ubuntu-latest
    needs: []                        # runs independently of lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen

      # Prefer `make test` if a Makefile exists; fall back to pytest.
      - name: Run tests
        run: |
          if [ -f Makefile ] && grep -q '^test:' Makefile; then
            echo "Makefile found — running: make test"
            uv run make test PYTHON="uv run python"
          else
            echo "No Makefile test target — running pytest directly"
            uv run pytest tests/ -v --tb=short
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
